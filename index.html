<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Delicious Recipes</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary fs-3" href="#">Delicious Recipes</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
        aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item"><a href="#" class="nav-link active" data-food="pizza">Pizza</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-food="pasta">Pasta</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-food="salad">Salad</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-food="cake">Cake</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-food="popcorn">Popcorn</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-food="mango">Mango</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Section -->
  <header class="hero-section text-center text-white d-flex flex-column justify-content-center align-items-center">
    <div class="overlay"></div>
    <div class="content">
      <h1 class="display-4 fw-bold mb-3">Welcome to Delicious Recipes</h1>
      <p class="fs-5 mb-4">Discover tasty and easy recipes to cook at home</p>
      <div class="search-box mx-auto position-relative" style="max-width: 400px;">
        <input type="text" id="input1" placeholder="Search for recipes..." class="form-control form-control-lg rounded-pill" />
        <ul id="searchWords" class="list-group position-absolute w-100 mt-1 shadow-sm d-none" style="z-index: 1050;"></ul>
        <div id="error" class="text-danger mt-2 d-none text-center">No recipes found. Please try another search.</div>
      </div>
    </div>
  </header>

  <!-- Recipes Grid -->
  <main class="container my-5" id="data">
    <div class="row g-4">
      <!-- Recipe cards will go here -->
    </div>
  </main>

  <!-- Recipe Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
      <div class="modal-content rounded-4 shadow">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title" id="exampleModalLabel">Recipe Details</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="model">
          <!-- Dynamic recipe details will be inserted here -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Custom JS -->
  <script src="js/main.js"></script>
</body>

</html>
